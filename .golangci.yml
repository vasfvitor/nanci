version: "2"

run:
  tests: true
  concurrency: 4

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused

    # HTTP / context / resource safety
    - bodyclose
    - noctx
    - contextcheck

    # SQL / resource safety
    - sqlclosecheck
    - rowserrcheck

    # Error correctness
    - errorlint
    - nilerr
    - nilnesserr
    - nilnil

    # Security
    - gosec

    # Maintainability / DX
    - revive
    - gocritic
    - unconvert
    - misspell
    - predeclared
    - copyloopvar
    - durationcheck
    - makezero
    - nolintlint

    # slog consistency
    - sloglint

  settings:
    misspell:
      ignore-rules:
        - adn

    errcheck:
      exclude-functions:
        - (*database/sql.Tx).Rollback
        - (*database/sql.Rows).Close
        - (*compress/gzip.Reader).Close

        - (*github.com/spf13/cobra.Command).MarkFlagRequired

    gosec:
      excludes:
        - G404

    revive:
      rules:
        - name: unused-parameter
          disabled: true
        - name: package-comments
          disabled: true

formatters:
  enable:
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/vasfvitor/nanci