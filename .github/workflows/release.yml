name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: Create as draft release
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Read release version
        id: version
        shell: bash
        run: |
          # If triggered by a tag push, extract it. Otherwise fallback to a default or input.
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="v0.0.0-dev"
          fi
          
          version="${tag#v}"
          
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check release tag does not exist
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Release tag already exists: $tag" >&2
            exit 1
          fi

  build-desktop:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install cross-compilation dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mingw-w64 nsis

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.7'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '10.33.0'

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Desktop App
        working-directory: ./internal/desktop
        env:
          GOFLAGS: -trimpath
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          COMMIT="${GITHUB_SHA::7}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          
          echo "Patching wails.json with version $VERSION..."
          jq --arg v "$VERSION" '.info.productVersion = $v' wails.json > wails.tmp.json
          mv wails.tmp.json wails.json
          
          echo "Building Wails app..."
          wails build -platform windows/amd64 -nsis -m \
            -ldflags "-X 'github.com/vasfvitor/nanci/internal/foundation/buildinfo.Version=$VERSION' -X 'github.com/vasfvitor/nanci/internal/foundation/buildinfo.Commit=$COMMIT' -X 'github.com/vasfvitor/nanci/internal/foundation/buildinfo.Date=$DATE'"
            
          test -s build/bin/nanci-desktop-amd64-installer.exe

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanci-desktop-windows-amd64-installer
          path: internal/desktop/build/bin/nanci-desktop-amd64-installer.exe
          if-no-files-found: error
          retention-days: 1

  publish-release:
    needs:
      - prepare
      - build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Download Desktop Artifact
        uses: actions/download-artifact@v4
        with:
          name: nanci-desktop-windows-amd64-installer
          path: artifacts/desktop

      - name: Stage Release Assets
        shell: bash
        run: |
          mkdir -p release

          cp artifacts/desktop/nanci-desktop-amd64-installer.exe \
            release/nanci-desktop-windows-amd64-installer.exe

          test -s release/nanci-desktop-windows-amd64-installer.exe

          cd release
          sha256sum \
            nanci-desktop-windows-amd64-installer.exe \
            > nanci-checksums.txt

          cat nanci-checksums.txt

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            release/nanci-desktop-windows-amd64-installer.exe
            release/nanci-checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.tag }}
          draft: ${{ inputs.draft }}
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          body: |
            ## Download

            - `nanci-desktop-windows-amd64-installer.exe`

            SHA-256 checksum:

            - `nanci-checksums.txt`
          files: |
            release/nanci-desktop-windows-amd64-installer.exe
            release/nanci-checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}