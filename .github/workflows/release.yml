name: Release

on:
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write     
      attestations: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 nsis

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '10.33.0'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Read release version
        id: release
        shell: bash
        run: |
          version="$(node -p "require('./internal/desktop/wails.json').info.productVersion")"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid Wails productVersion: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Build Desktop App (Wails)
        working-directory: ./internal/desktop
        # -nsis builds the Windows installer
        # -m builds without console (production mode)
        env:
          GOFLAGS: "-trimpath"
        run: wails build -platform windows/amd64 -nsis -m

      - name: Build CLI App
        run: |
          mkdir -p build
          GOOS=windows GOARCH=amd64 go build -trimpath -o build/nanci.exe ./cmd/nanci

      - name: Generate Checksums (SHA-256)
        run: |
          sha256sum internal/desktop/build/bin/nanci-desktop-amd64-installer.exe > checksums.txt
          sha256sum build/nanci.exe >> checksums.txt

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            internal/desktop/build/bin/nanci-desktop-amd64-installer.exe
            build/nanci.exe
            checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Release ${{ steps.release.outputs.tag }}
          draft: ${{ github.event.inputs.draft }}
          files: |
            internal/desktop/build/bin/nanci-desktop-amd64-installer.exe
            build/nanci.exe
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
