name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Read release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
            is_release="true"
          else
            tag="v0.0.0-dev"
            is_release="false"
          fi

          version="${tag#v}"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "is_release=$is_release" >> "$GITHUB_OUTPUT"

      - name: Validate SemVer and compare with previous
        if: steps.version.outputs.is_release == 'true'
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"

          if ! [[ "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Tag '$tag' is not a valid strict semver. Expected format: vX.Y.Z"
            exit 1
          fi

          prev_tag=$(
            git ls-remote --tags --refs origin \
              | awk -F '/' '{print $3}' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | grep -v "^${tag}$" \
              | sort -V \
              | tail -n 1
          )

          if [ -z "$prev_tag" ]; then
            echo "No previous valid semver tags found. Proceeding as first release."
            exit 0
          fi

          echo "Previous highest version: $prev_tag"
          echo "Current version: $tag"

          highest=$(printf "%s\n%s\n" "$prev_tag" "$tag" | sort -V | tail -n 1)

          if [ "$highest" != "$tag" ]; then
            echo "::error::New version ($tag) must be greater than previous highest version ($prev_tag)."
            exit 1
          fi

          echo "Validation passed: $tag is greater than $prev_tag."

  build-desktop:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install cross-compilation dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mingw-w64 nsis

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.7'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '10.33.0'

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Desktop App
        working-directory: ./internal/desktop
        env:
          GOFLAGS: -trimpath
        shell: bash
        run: |
          version="${{ needs.prepare.outputs.version }}"
          commit="${GITHUB_SHA::7}"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "Patching wails.json with version $version..."
          jq --arg v "$version" '.info.productVersion = $v' wails.json > wails.tmp.json
          mv wails.tmp.json wails.json

          echo "Building Wails app..."
          wails build -platform windows/amd64 -nsis -m \
            -ldflags "-X 'github.com/vasfvitor/nanci/internal/foundation/buildinfo.Version=$version' -X 'github.com/vasfvitor/nanci/internal/foundation/buildinfo.Commit=$commit' -X 'github.com/vasfvitor/nanci/internal/foundation/buildinfo.Date=$date'"

          test -s build/bin/nanci-desktop-amd64-installer.exe

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanci-desktop-windows-amd64-installer
          path: internal/desktop/build/bin/nanci-desktop-amd64-installer.exe
          if-no-files-found: error
          retention-days: 7

  publish-release:
    if: needs.prepare.outputs.is_release == 'true'
    needs:
      - prepare
      - build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Download Desktop Artifact
        uses: actions/download-artifact@v4
        with:
          name: nanci-desktop-windows-amd64-installer
          path: artifacts/desktop

      - name: Stage Release Assets
        shell: bash
        run: |
          mkdir -p release

          tag="${{ needs.prepare.outputs.tag }}"

          cp artifacts/desktop/nanci-desktop-amd64-installer.exe \
            "release/nanci-desktop-windows-amd64-${tag}-installer.exe"

          test -s "release/nanci-desktop-windows-amd64-${tag}-installer.exe"

          cd release
          sha256sum * > nanci-checksums.txt

          cat nanci-checksums.txt

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            release/*.exe
            release/nanci-checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.tag }}
          draft: false
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          body: |
            ## Download

            - `nanci-desktop-windows-amd64-${{ needs.prepare.outputs.tag }}-installer.exe`

            SHA-256 checksum:

            - `nanci-checksums.txt`
          files: |
            release/*.exe
            release/nanci-checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}