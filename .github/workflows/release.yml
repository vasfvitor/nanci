name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 nsis

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '9'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Desktop App (Wails)
        working-directory: ./internal/desktop
        # -nsis builds the Windows installer
        # -m builds without console (production mode)
        run: wails build -platform windows/amd64 -nsis -m

      - name: Build CLI App
        # Building the standalone CLI to root build/ dir
        run: |
          mkdir -p build
          GOOS=windows GOARCH=amd64 go build -o build/nanci.exe ./cmd/nanci

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: ${{ github.event.inputs.draft }}
          files: |
            internal/desktop/build/bin/nanci-desktop-amd64-installer.exe
            build/nanci.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
